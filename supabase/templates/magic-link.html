<!--
  Supabase — modèle "Magic Link" (FR)
  Sujet : Votre lien de connexion Timmo
  Dashboard : Authentication → Emails → Magic Link
-->
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f6fb;padding:40px 0;font-family:Arial,Helvetica,sans-serif;">
  <tr>
    <td align="center">
      <table width="480" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:16px;overflow:hidden;">
        <tr>
          <td style="background-color:#0F1729;padding:26px 32px;">
            <span style="color:#ffffff;font-size:22px;font-weight:bold;letter-spacing:1px;">Timmo</span>
          </td>
        </tr>
        <tr>
          <td style="padding:36px 32px;">
            <h1 style="margin:0 0 12px;color:#0F1729;font-size:22px;">Votre lien de connexion</h1>
            <p style="margin:0 0 24px;color:#4b5563;font-size:15px;line-height:1.6;">
              Cliquez sur le bouton ci-dessous pour vous connecter à votre compte Timmo.
            </p>
            <table cellpadding="0" cellspacing="0">
              <tr>
                <td style="border-radius:9999px;background-color:#0F1729;">
                  <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 32px;color:#ffffff;font-size:15px;font-weight:bold;text-decoration:none;border-radius:9999px;">
                    Se connecter
                  </a>
                </td>
              </tr>
            </table>
            <p style="margin:24px 0 0;color:#9ca3af;font-size:13px;line-height:1.6;">
              Ce lien expire dans 1 heure. Si vous n'êtes pas à l'origine de cette demande, ignorez cet email.
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:20px 32px;background-color:#f4f6fb;color:#9ca3af;font-size:12px;">
            &copy; 2026 Timmo — Investissez dans l'immobilier d&egrave;s 10&euro;
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
